<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Username Check</title>
</head>
<body>
    <h2>CHECK USERNAME</h2>
    <label for="username">Choose a username:</label>
    <input type="text" id="username" name="username" oninput="checkUsername(this.value)">
    <div id="status"></div>

    <script>
        async function checkUsername(username) {
            if (!username) {
                document.getElementById('status').innerText = '';
                return;
            }

            try {
                const response = await fetch('check_user.php', {
                method: 'POST',
                headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `username=${encodeURIComponent(username)}`
                });
                const data = await response.json();

                const messageBox = document.getElementById('status');
                messageBox.innerText = data.message;
                messageBox.style.color = data.available ? 'green' : 'red';
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
    </script>    
</body>
</html>
